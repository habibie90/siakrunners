<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siak Runners - Leaderboard</title>
    <!-- Library pembuat poster -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- (Biarkan CSS Tailwind atau custom CSS Bapak di sini jika ada) -->
</head>
<body style="background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px;">

    <!-- ======================================================= -->
    <!-- BAGIAN 1: TOMBOL-TOMBOL AKSI -->
    <!-- ======================================================= -->
    <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <!-- Tombol Cetak Poster Standar -->
        <button onclick="generatePosterIG(event)" style="background: #ea580c; color: white; padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;">
            📸 Feed (Top 5)
        </button>
        <button onclick="generatePosterStory(event)" style="background: #9333ea; color: white; padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;">
            📸 Story (Top 10)
        </button>
        
        <!-- Tombol Fitur Premium AI Photobomb -->
        <input type="file" id="input-foto-personal" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('input-foto-personal').click()" style="background-color: #3b82f6; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer;">
            👤 Tambah Foto Pamer (Otomatis Hapus Latar)
        </button>
    </div>

    <!-- (Tabel klasemen utama website diletakkan di sini) -->
    <!-- <div id="tabel-klasemen">...</div> -->


    <!-- ======================================================= -->
    <!-- BAGIAN 2: KANVAS POSTER FEED (Disembunyikan) -->
    <!-- ======================================================= -->
    <div id="poster-container" class="hidden" style="position: fixed; left: 0; top: 0; z-index: -9999; display: none;">
        <div id="poster-weekly" style="width: 1080px; height: 1350px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); padding: 60px; position: relative; overflow: hidden;">
            
            <!-- Foto Personal (Latar Belakang) -->
            <img id="gambar-personal-overlay" src="" crossorigin="anonymous" style="display: none; position: absolute; bottom: 0; left: 0; width: 65%; max-height: 85%; object-fit: contain; z-index: 0; opacity: 0.9;">

            <!-- Konten Klasemen -->
            <div style="position: relative; z-index: 10;">
                <div style="text-align: center; margin-bottom: 50px;">
                    <h2 style="font-size: 40px; color: #9ca3af; letter-spacing: 5px; margin: 0;">LEADERBOARD KLASEMEN</h2>
                    <h1 style="font-size: 90px; color: white; font-weight: 900; margin: 10px 0;">SIAK RUNNERS</h1>
                    <div style="background: rgba(255,255,255,0.1); display: inline-block; padding: 15px 40px; border-radius: 50px;">
                        <span id="poster-tanggal" style="font-size: 30px; color: #cbd5e1; font-weight: bold;"></span>
                    </div>
                </div>
                <div id="poster-daftar-juara" style="display: flex; flex-direction: column; gap: 20px;"></div>
            </div>
            
            <!-- Footer -->
            <div style="position: absolute; bottom: 50px; left: 0; width: 100%; text-align: center; z-index: 10;">
                <h3 style="color: white; font-size: 35px; margin: 0;">Terus Bergerak, Terus Berlari!</h3>
                <p style="color: #9ca3af; font-size: 25px; margin-top: 10px;">Generate otomatis via siakrunners.vercel.app</p>
            </div>
        </div>
    </div>


    <!-- ======================================================= -->
    <!-- BAGIAN 3: KANVAS POSTER STORY (Disembunyikan) -->
    <!-- ======================================================= -->
    <div id="poster-container-story" class="hidden" style="position: fixed; left: 0; top: 0; z-index: -9999; display: none;">
        <div id="poster-weekly-story" style="width: 1080px; height: 1920px; background: linear-gradient(180deg, #0f172a 0%, #000000 100%); padding: 60px 50px; position: relative; overflow: hidden;">
            
            <!-- Foto Personal (Latar Belakang) -->
            <img id="gambar-personal-overlay-story" src="" crossorigin="anonymous" style="display: none; position: absolute; bottom: 0; left: -50px; width: 75%; max-height: 80%; object-fit: contain; z-index: 0; opacity: 0.9;">

            <!-- Konten Klasemen -->
            <div style="position: relative; z-index: 10;">
                <div style="text-align: center; margin-bottom: 50px;">
                    <h2 style="font-size: 35px; color: #9ca3af; letter-spacing: 4px; margin: 0;">TOP 10 LEADERBOARD</h2>
                    <h1 style="font-size: 85px; color: white; font-weight: 900; margin: 10px 0;">SIAK RUNNERS</h1>
                    <div style="background: rgba(255,255,255,0.1); display: inline-block; padding: 15px 40px; border-radius: 50px;">
                        <span id="poster-tanggal-story" style="font-size: 30px; color: #cbd5e1; font-weight: bold;"></span>
                    </div>
                </div>
                <div id="poster-daftar-juara-story" style="display: flex; flex-direction: column; gap: 20px;"></div>
            </div>
            
            <!-- Footer -->
            <div style="position: absolute; bottom: 60px; left: 0; width: 100%; text-align: center; z-index: 10;">
                <h3 style="color: white; font-size: 35px; margin: 0;">siakrunners.vercel.app</h3>
            </div>
        </div>
    </div>


    <!-- ======================================================= -->
    <!-- BAGIAN 4: KODINGAN JAVASCRIPT UTAMA -->
    <!-- ======================================================= -->
    <script>
        // Variabel penampung data (Pastikan logika fetch dari Google Sheet Bapak mengisi variabel ini)
        let currentSortedData = []; 
        let profilesData = {};

        // --- 1. Fungsi Fitur Premium: Upload & Hapus Latar Belakang AI ---
        document.getElementById('input-foto-personal').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            alert("⏳ Mengupload & AI sedang menghapus latar belakang... Mohon tunggu 5-10 detik.");

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'fhi6tgyi'); // Preset Cloudinary Bapak

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dsai9btzj/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.secure_url) {
                    // Panggil AI Pixelz untuk membersihkan background
                    let urlTransparan = data.secure_url.replace('/upload/', '/upload/e_pixelz/').replace(/\.jpg|\.jpeg/i, '.png');

                    // Tampilkan di Poster Feed
                    const imgFeed = document.getElementById('gambar-personal-overlay');
                    if(imgFeed) { imgFeed.src = urlTransparan; imgFeed.style.display = 'block'; }
                    
                    // Tampilkan di Poster Story
                    const imgStory = document.getElementById('gambar-personal-overlay-story');
                    if(imgStory) { imgStory.src = urlTransparan; imgStory.style.display = 'block'; }
                    
                    alert("✅ Foto gagah Anda berhasil ditempel! Silakan klik tombol 'Feed' atau 'Story' untuk mencetak poster.");
                } else {
                    alert("❌ Terjadi kesalahan saat mengupload foto.");
                }
            } catch (err) {
                console.error(err);
                alert("❌ Gagal menghubungi server AI Cloudinary.");
            }
        });

        // --- 2. Fungsi Cetak Poster FEED (Top 5) ---
        async function generatePosterIG(event) {
            const tombol = event.currentTarget;
            const teksAsli = tombol.innerHTML;
            tombol.innerHTML = "⏳ Melukis Poster...";
            tombol.disabled = true;

            try {
                // Tulis Periode (Sesuaikan dengan ID dropdown periode jika ada)
                const sel = document.getElementById('time-filter'); 
                const periodeTeks = sel ? sel.options[sel.selectedIndex].text : "Periode Saat Ini";
                document.getElementById('poster-tanggal').innerText = `PERIODE: ${periodeTeks}`;

                // Susun 5 Pelari Teratas
                const daftarJuara = document.getElementById('poster-daftar-juara');
                daftarJuara.innerHTML = ''; 
                let top5Data = currentSortedData.slice(0, 5); 

                let htmlDaftar = '';
                top5Data.forEach((pelari, index) => {
                    let medali = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    let picUrl = profilesData[pelari.name]?.foto || 'https://via.placeholder.com/150/1e293b/ffffff?text=SR';
                    
                    htmlDaftar += `
                        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 25px;">
                                <span style="font-size: 40px; font-weight: bold; width: 50px; text-align: center;">${medali}</span>
                                <img src="${picUrl}" crossorigin="anonymous" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ea580c; object-fit: cover; background: #1e293b;">
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-size: 35px; font-weight: bold; color: white;">${pelari.name}</span>
                                    <span style="font-size: 18px; color: #cbd5e1; margin-top: 2px;">${pelari.runs || 1}x Aktivitas Lari</span>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <span style="font-size: 45px; font-weight: 900; color: #38bdf8;">${pelari.distance.toFixed(2)} <span style="font-size: 24px; color:#9ca3af;">KM</span></span>
                            </div>
                        </div>
                    `;
                });
                daftarJuara.innerHTML = htmlDaftar;

                // Tampilkan container untuk dirender oleh html2canvas
                const posterContainer = document.getElementById('poster-container');
                const posterElemen = document.getElementById('poster-weekly');
                posterContainer.style.display = 'block';
                posterContainer.style.left = '-9999px';

                tombol.innerHTML = "📸 Memotret...";

                // Tunggu gambar termuat sempurna sebelum dijepret
                const daftarGambar = Array.from(posterElemen.getElementsByTagName('img'));
                await Promise.all(daftarGambar.map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                }));
                await new Promise(r => setTimeout(r, 500)); 

                // Proses Render
                const canvas = await html2canvas(posterElemen, { scale: 2, useCORS: true, backgroundColor: '#0f172a' });
                
                posterContainer.style.display = 'none';
                posterContainer.style.left = '0';

                const imageURI = canvas.toDataURL("image/jpeg", 0.9);
                if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
                    const blob = await (await fetch(imageURI)).blob();
                    const file = new File([blob], 'SiakRunners-Feed.jpg', { type: 'image/jpeg' });
                    await navigator.share({ title: 'Siak Runners Leaderboard', files: [file] });
                } else {
                    const link = document.createElement('a'); link.download = 'SiakRunners-Feed.jpg';
                    link.href = imageURI; link.click();
                }
            } catch (err) {
                console.error(err); alert("Gagal meracik poster.");
            } finally {
                tombol.innerHTML = teksAsli; tombol.disabled = false;
                document.getElementById('poster-container').style.display = 'none';
            }
        }

        // --- 3. Fungsi Cetak Poster STORY (Top 10) ---
        async function generatePosterStory(event) {
            const tombol = event.currentTarget;
            const teksAsli = tombol.innerHTML;
            tombol.innerHTML = "⏳ Melukis Poster...";
            tombol.disabled = true;

            try {
                document.getElementById('poster-tanggal-story').innerText = "PERIODE SAAT INI";

                const daftarJuara = document.getElementById('poster-daftar-juara-story');
                daftarJuara.innerHTML = ''; 
                let top10Data = currentSortedData.slice(0, 10); 

                let htmlDaftarJuara = '';
                top10Data.forEach((pelari, index) => {
                    let medali = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    let picUrl = profilesData[pelari.name]?.foto || 'https://via.placeholder.com/150/1e293b/ffffff?text=SR';
                    
                    htmlDaftarJuara += `
                        <div style="background: rgba(255,255,255,0.08); border-radius: 20px; padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; border-left: 8px solid ${index === 0 ? '#fbbf24' : index === 1 ? '#94a3b8' : index === 2 ? '#b45309' : 'transparent'};">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <span style="font-size: 35px; font-weight: bold; width: 45px; text-align: center;">${medali}</span>
                                <img src="${picUrl}" crossorigin="anonymous" style="width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; object-fit: cover; background: #1e293b;">
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-size: 28px; font-weight: bold; color: white;">${pelari.name}</span>
                                    <span style="font-size: 18px; color: #cbd5e1; margin-top: 2px;">${pelari.runs || 1}x Aktivitas Lari</span>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <span style="font-size: 42px; font-weight: 900; color: #38bdf8;">${pelari.distance.toFixed(2)} <span style="font-size: 20px; color:#9ca3af;">KM</span></span>
                            </div>
                        </div>
                    `;
                });
                daftarJuara.innerHTML = htmlDaftarJuara;

                const posterContainer = document.getElementById('poster-container-story');
                const posterElemen = document.getElementById('poster-weekly-story');
                
                posterContainer.style.display = 'block';
                posterContainer.style.left = '-9999px';

                tombol.innerHTML = "📸 Memotret...";

                const daftarGambar = Array.from(posterElemen.getElementsByTagName('img'));
                await Promise.all(daftarGambar.map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                }));
                await new Promise(r => setTimeout(r, 500)); 

                const canvas = await html2canvas(posterElemen, { scale: 2, useCORS: true, backgroundColor: '#0f172a' });
                
                posterContainer.style.display = 'none';
                posterContainer.style.left = '0';

                const imageURI = canvas.toDataURL("image/jpeg", 0.9);
                if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
                    const blob = await (await fetch(imageURI)).blob();
                    const file = new File([blob], 'SiakRunners-Top10.jpg', { type: 'image/jpeg' });
                    await navigator.share({ title: 'Top 10 Siak Runners', files: [file] });
                } else {
                    const link = document.createElement('a'); link.download = 'SiakRunners-Top10.jpg';
                    link.href = imageURI; link.click();
                }
            } catch (err) {
                console.error(err); alert("Gagal meracik poster story.");
            } finally {
                tombol.innerHTML = teksAsli; tombol.disabled = false;
                document.getElementById('poster-container-story').style.display = 'none';
            }
        }
    </script>
</body>
</html>
